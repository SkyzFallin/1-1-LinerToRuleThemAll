<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 180" width="760" height="180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff4444"/>
      <stop offset="50%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff4444"/>
    </linearGradient>
    <linearGradient id="innerRingGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc3333"/>
      <stop offset="100%" style="stop-color:#992222"/>
    </linearGradient>
    <filter id="redGlow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="greenGlow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.5"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="760" height="180" fill="url(#bgGrad)" rx="10"/>

  <!-- Subtle grid lines (terminal feel) -->
  <g opacity="0.04" stroke="#ff4444" stroke-width="0.5">
    <line x1="0" y1="30" x2="760" y2="30"/>
    <line x1="0" y1="60" x2="760" y2="60"/>
    <line x1="0" y1="90" x2="760" y2="90"/>
    <line x1="0" y1="120" x2="760" y2="120"/>
    <line x1="0" y1="150" x2="760" y2="150"/>
    <line x1="30" y1="0" x2="30" y2="180"/>
    <line x1="60" y1="0" x2="60" y2="180"/>
    <line x1="90" y1="0" x2="90" y2="180"/>
    <line x1="120" y1="0" x2="120" y2="180"/>
    <line x1="150" y1="0" x2="150" y2="180"/>
    <line x1="180" y1="0" x2="180" y2="180"/>
    <line x1="210" y1="0" x2="210" y2="180"/>
  </g>

  <!-- ========== CROSSHAIR / TARGET RETICLE ILLUSTRATION ========== -->

  <!-- Outer targeting ring -->
  <circle cx="110" cy="90" r="52" fill="none" stroke="url(#ringGrad)" stroke-width="3" opacity="0.8" filter="url(#redGlow)"/>

  <!-- Inner targeting ring -->
  <circle cx="110" cy="90" r="36" fill="none" stroke="url(#innerRingGrad)" stroke-width="2" opacity="0.6"/>

  <!-- Innermost ring -->
  <circle cx="110" cy="90" r="18" fill="none" stroke="#ff4444" stroke-width="1.5" opacity="0.5"/>

  <!-- Bullseye dot -->
  <circle cx="110" cy="90" r="4" fill="#ff4444" opacity="0.9" filter="url(#redGlow)"/>

  <!-- Crosshair lines -->
  <line x1="110" y1="30" x2="110" y2="70" stroke="#3fb950" stroke-width="1" opacity="0.6"/>
  <line x1="110" y1="110" x2="110" y2="150" stroke="#3fb950" stroke-width="1" opacity="0.6"/>
  <line x1="50" y1="90" x2="90" y2="90" stroke="#3fb950" stroke-width="1" opacity="0.6"/>
  <line x1="130" y1="90" x2="170" y2="90" stroke="#3fb950" stroke-width="1" opacity="0.6"/>

  <!-- Tick marks on crosshairs -->
  <g stroke="#3fb950" stroke-width="1" opacity="0.4">
    <line x1="106" y1="44" x2="114" y2="44"/>
    <line x1="106" y1="56" x2="114" y2="56"/>
    <line x1="106" y1="124" x2="114" y2="124"/>
    <line x1="106" y1="136" x2="114" y2="136"/>
    <line x1="64" y1="86" x2="64" y2="94"/>
    <line x1="76" y1="86" x2="76" y2="94"/>
    <line x1="144" y1="86" x2="144" y2="94"/>
    <line x1="156" y1="86" x2="156" y2="94"/>
  </g>

  <!-- Corner brackets (HUD targeting overlay) -->
  <g stroke="#ff6b35" stroke-width="1.5" fill="none" opacity="0.5">
    <path d="M68,50 L58,50 L58,60"/>
    <path d="M152,50 L162,50 L162,60"/>
    <path d="M68,130 L58,130 L58,120"/>
    <path d="M152,130 L162,130 L162,120"/>
  </g>

  <!-- Small target data readouts -->
  <g font-family="'Courier New', Courier, monospace" font-size="7" fill="#ff6b35" opacity="0.45">
    <text x="58" y="47">TGT_ACQ</text>
    <text x="140" y="47">LOCK:ON</text>
    <text x="58" y="142">RNG:40</text>
    <text x="140" y="142">CMD:RDY</text>
  </g>

  <!-- ========== TEXT ========== -->

  <!-- Accent divider line -->
  <line x1="200" y1="45" x2="200" y2="145" stroke="#ff4444" stroke-width="1" opacity="0.25"/>

  <!-- Main title -->
  <text x="215" y="72"
    font-family="'Courier New', Courier, monospace"
    font-size="26"
    font-weight="900"
    letter-spacing="1"
    fill="url(#ringGrad)"
    filter="url(#redGlow)">1-1-LinerToRuleThemAll</text>

  <!-- Subtitle -->
  <text x="217" y="96"
    font-family="'Courier New', Courier, monospace"
    font-size="13"
    font-weight="400"
    letter-spacing="2"
    fill="#8b949e">Penetration Testing One-Liner Arsenal</text>

  <!-- Tagline with green terminal aesthetic -->
  <text x="217" y="122"
    font-family="'Courier New', Courier, monospace"
    font-size="11.5"
    font-weight="400"
    letter-spacing="0.5"
    fill="#3fb950"
    filter="url(#greenGlow)">$ python3 1-1-LinerToRuleThemAll.py  # 40 weaponized cmds</text>

  <!-- Version badge -->
  <rect x="217" y="134" width="44" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="239" y="146"
    font-family="'Courier New', Courier, monospace"
    font-size="9.5"
    font-weight="700"
    text-anchor="middle"
    fill="#6b7280">v1.0</text>

  <!-- Python badge -->
  <rect x="267" y="134" width="52" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="293" y="146"
    font-family="'Courier New', Courier, monospace"
    font-size="9.5"
    font-weight="700"
    text-anchor="middle"
    fill="#6b7280">python3</text>

  <!-- Pentest badge -->
  <rect x="325" y="134" width="56" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="353" y="146"
    font-family="'Courier New', Courier, monospace"
    font-size="9.5"
    font-weight="700"
    text-anchor="middle"
    fill="#6b7280">pentest</text>

  <!-- 40 cmds badge -->
  <rect x="387" y="134" width="60" height="16" rx="3" fill="#1f2937" stroke="#374151" stroke-width="1"/>
  <text x="417" y="146"
    font-family="'Courier New', Courier, monospace"
    font-size="9.5"
    font-weight="700"
    text-anchor="middle"
    fill="#6b7280">40 cmds</text>

  <!-- Right side decorative: faded category listing -->
  <g font-family="'Courier New', Courier, monospace" font-size="9.5" fill="#ff4444" opacity="0.15" filter="url(#redGlow)">
    <text x="560" y="40">[01] Recon: subfinder | dnsx | httpx</text>
    <text x="560" y="55">[06] Auth: password spray | JWT | OAuth</text>
    <text x="560" y="70">[11] Injection: SQLi | NoSQLi | SSTI</text>
    <text x="560" y="85">[16] SSRF: metadata | SMB | deser</text>
    <text x="560" y="100">[20] Logic: race | IDOR | mass-assign</text>
    <text x="560" y="115">[24] Chains: XSS+exfil | cloud+escape</text>
    <text x="560" y="130">[31] Evasion: WAF bypass | rate limit</text>
    <text x="560" y="145">[36] Advanced: XXE | GraphQL | proto</text>
  </g>

</svg>
